name: Monthly Report

on:
  schedule:
    # 毎月1日 JST 6:00 (UTC 前日 21:00)
    - cron: "0 21 1 * *"
  workflow_dispatch:

jobs:
  report:
    permissions:
      contents: read
    concurrency:
      group: monthly-report
      cancel-in-progress: false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Create monthly report
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DWM_DATABASE_ID: ${{ secrets.NOTION_DWM_DATABASE_ID }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
        run: python scripts/monthly_report.py
