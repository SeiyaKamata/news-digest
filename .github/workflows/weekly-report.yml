name: Weekly Report

on:
  schedule:
    # 毎週月曜 JST 6:00 (UTC 日曜 21:00)
    - cron: "0 21 * * 0"
  workflow_dispatch:

jobs:
  report:
    permissions:
      contents: read
    concurrency:
      group: weekly-report
      cancel-in-progress: false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Create weekly report
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DWM_DATABASE_ID: ${{ secrets.NOTION_DWM_DATABASE_ID }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
        run: python scripts/weekly_report.py
